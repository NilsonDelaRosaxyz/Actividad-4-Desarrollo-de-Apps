workflows:
  ecowatt-android:
    name: EcoWatt Android Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Obtener dependencias
        script: |
          flutter pub get
      - name: Analizar codigo (opcional, no bloquea el build)
        script: |
          flutter analyze || true
      - name: Compilar APK debug
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
    publishing:
      email:
        recipients:
          - tjuliop@unicartagena.edu.co
        notify:
          success: true
          failure: true
